<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>semimarinus</title>

<style>
  :root {
    --text-main: #1f2933;
    --text-sub: #6b7280;
    --accent: #3058af;
    --border: #e5e7eb;
    --bg: #ffffff;
  }

  body {
    margin: 0;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                 "Hiragino Sans", "Noto Sans JP", sans-serif;
    color: var(--text-main);
    line-height: 1.7;
  }

  .container {
    max-width: 720px;
    margin: 80px auto;
    padding: 0 24px;
  }

  .entry {
    border-top: 1px solid var(--border);
    padding-top: 28px;
  }

  .head {
    display: flex;
    flex-wrap: wrap;
    align-items: baseline;
    gap: 10px;
  }

  .headword {
    font-size: 28px;
    font-weight: 600;
    color: var(--text-main);
    letter-spacing: 0.02em;
  }

  .grammar {
    font-size: 15px;
    color: var(--text-sub);
  }

  .definition {
    margin-top: 22px;
    font-size: 16px;
  }

  .definition strong {
    font-weight: 600;
  }

  .definition i {
    font-style: italic;
    color: var(--text-main);
  }

  .source {
    margin-top: 28px;
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.6;
  }
</style>
</head>

<body>
  <div class="container">
    <div class="entry">
      <div class="head">
        <div class="headword">sēmi-marīnus</div>
        <div class="grammar">a, um, adj.</div>
      </div>

      <div class="definition">
        <strong>I.</strong> <i>half in the sea</i>

        <div class="source">
          A Latin Dictionary. Founded on Andrews' edition of Freund's Latin dictionary,
          revised, enlarged, and in great part rewritten by Charlton T. Lewis, Ph.D.
          and Charles Short, LL.D. Oxford, Clarendon Press, 1879.
        </div>
      </div>
    </div>
  </div>
</body>
</html>
